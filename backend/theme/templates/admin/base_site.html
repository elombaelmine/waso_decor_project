{% extends "admin/base_site.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    /* ==========================================================================
       WASO DECO ADVANCED BUSINESS UX & VISUAL PALETTE
       ========================================================================== */
    :root {
        --primary: #0a2f1d;
        --secondary: #14442a;
        --accent: #c5a059;
        --dark-bg: #121212;
        --card-bg: #1c1c1c;
        --text-light: #ffffff;
    }

    body {
        background-color: var(--dark-bg) !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
    }

    /* 1. Header & Branding */
    #header {
        background: var(--primary) !important;
        border-bottom: 3px solid var(--accent) !important;
        padding: 15px 40px !important;
    }

    #branding h1 a, #branding h1 {
        color: var(--accent) !important;
        font-family: 'Georgia', serif !important;
        letter-spacing: 1px !important;
    }

    /* 2. Modern Card Modules */
    .module {
        background: var(--card-bg) !important;
        border: 1px solid #2d2d2d !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
    }

    .module h2, .module caption, .inline-group h2 {
        background: var(--secondary) !important;
        color: var(--accent) !important;
        border-bottom: 1px solid var(--accent) !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
    }

    /* 3. Form Layouts */
    .form-row {
        border-bottom: 1px solid #333 !important;
        padding: 20px !important;
    }

    .form-row label {
        color: var(--accent) !important;
        font-weight: 600 !important;
    }

    input[type="text"], input[type="url"], textarea, select {
        background: #252525 !important;
        border: 1px solid #444 !important;
        color: white !important;
        border-radius: 6px !important;
        padding: 8px !important;
    }

    /* 4. Buttons & Actions */
    .button.default, input[type=submit].default {
        background: var(--accent) !important;
        color: var(--primary) !important;
        font-weight: 700 !important;
        border-radius: 4px !important;
        border: none !important;
        padding: 10px 20px !important;
    }

    .button.default:hover {
        background: var(--text-light) !important;
        box-shadow: 0 0 10px rgba(197, 160, 89, 0.5) !important;
    }

    /* 5. Tables & Rows */
    #changelist .results th { background: #191919 !important; }
    
    tr:hover {
        background-color: #143021 !important;
        transition: 0.2s !important;
    }

    /* 6. Messaging */
    .messagelist li.success {
        background: var(--secondary) !important;
        color: var(--accent) !important;
        border: 1px solid var(--accent) !important;
        border-radius: 8px !important;
    }

    /* 7. Search Bar */
    #searchbar {
        background: #252525 !important;
        border: 1px solid #444 !important;
        color: white !important;
        border-radius: 20px !important;
    }
</style>
{% endblock %}
